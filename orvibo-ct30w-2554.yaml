# ==================== orvibo-ct30w.yaml 最终黄金版 ====================
esphome:
  name: orvibo-ct30w-2554

esp8266:
  board: esp_wroom_02
  restore_from_flash: true # 建议开启，以恢复状态

# Network and API settings
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "orvibo-ct30w-2554"
    password: "12345678"

captive_portal:

api:

ota:
  platform: esphome
  password: !secret ota_password

logger:
  level: INFO

web_server:
  port: 80

# Hardware Pins
status_led:
  pin: 15

# IR Receiver (for learning codes)
remote_receiver:
  pin:
    number: 5
    inverted: True
  dump: all
  
# IR Transmitter (for sending codes)
remote_transmitter:
  pin:
    number: 14
  carrier_duty_percent: 50%

# -------------------- 核心开关实体 (带双重打击功能) --------------------
 
switch:
  - platform: template
    name: "空调"
    id: ac_power_switch
    icon: "mdi:air-conditioner"
    optimistic: true
 
    # 开机动作: (这里使用您之前确认的17度制冷码)
    turn_on_action:
      - remote_transmitter.transmit_pronto:
          # 制冷 17度
          data: "0000 006D 0064 0000 00A5 00AD 0011 0042 0011 0019 0011 0043 0010 0043 0010 0019 0011 0019 0011 0043 0010 0019 0011 0019 0011 0042 0011 0018 0010 0019 0011 0043 0010 0043 0010 0019 0011 0043 0011 0019 0011 0018 0010 0043 0011 0042 0011 0043 0010 0043 0010 0043 0011 0042 0011 0042 0010 0043 0010 0019 0011 0019 0010 0019 0010 0019 0011 0018 0011 0018 0010 0019 0011 0018 0010 001A 0010 001A 0010 0019 0011 0019 0010 0019 0010 0019 0010 0043 0010 0044 000F 0043 0011 0043 000F 0044 000F 0044 0010 0043 000F 0043 0010 00CD 00A5 00AE 000F 0044 000F 001A 000F 0044 000F 0044 000F 001A 000F 001A 000F 0044 000F 001A 000F 001A 000F 0044 000F 001A 000F 001A 000F 0044 000F 0044 000F 001A 0010 0044 000F 001A 000F 001A 000F 0044 0010 0044 000F 0044 000F 0044 000F 0044 000F 0044 0010 0043 0010 0043 000F 001A 000F 001A 000F 001A 000F 001A 0010 0019 000F 001A 000F 001A 000F 001A 0010 0019 000F 001A 000F 001A 0010 0019 000F 001A 0010 0019 0010 0044 0010 0043 0010 0044 000F 0044 000F 0044 000F 0044 000F 0044 000F 0044 000F 0181"
          repeat:
            times: 2
            wait_time: 40ms
 
    # 关机动作: 执行“两步关机”流程
    turn_off_action:
      # 第一步: 发送“正常关机”指令 (这会触发空调进入干燥模式)
      - remote_transmitter.transmit_pronto:
          data: "0000 006D 0064 0000 00AB 00A7 0016 003F 0014 0013 0016 003F 0014 003F 0014 0013 0016 0013 0016 003F 0014 0013 0016 0013 0016 003F 0014 0013 0016 0013 0016 003E 0015 003E 0015 0013 0016 003E 0015 0013 0016 003E 0015 003E 0016 003D 0016 003D 0016 0013 0015 003E 0015 003E 0015 003F 0014 0015 0015 0014 0014 0015 0015 0014 0014 003F 0013 0017 0015 0014 0014 0040 0013 0041 0013 0041 0013 0017 0014 0015 0014 0016 0014 0016 0014 0016 0014 0015 0015 0015 0015 0014 0015 003F 0015 003F 0015 003F 0015 0040 0013 0041 0014 00CA 00A8 00AB 0013 0041 0012 0019 0012 0042 0012 0042 0011 0019 0011 0019 0010 0043 0011 0019 0010 001A 0010 0044 0010 001A 0010 001A 0010 0044 0010 0044 0010 001A 0010 0044 0010 001A 0010 0045 000F 0045 000E 0045 000E 0045 000E 001B 000E 0046 000E 0045 000E 0045 000E 001B 000E 001B 000E 001B 000E 001B 000E 0046 000D 001C 000D 001C 000D 0046 000D 0046 000D 0046 000D 001C 000C 001D 000D 001C 000C 001E 000B 001D 000C 001D 000C 001E 000B 001E 000B 0048 000B 0048 000B 0048 000B 0048 000B 0048 000B 0181"
          repeat:
            times: 2
            wait_time: 40ms
      
      # 第二步: 延迟2秒，等待空调响应
      - delay: 2s
 
      # 第三步: 发送“关闭干燥/立即关机”指令
      - remote_transmitter.transmit_pronto:
          data: "0000 006D 0064 0000 00A6 00AC 0011 0043 0011 0019 0011 0043 0011 0043 0010 0019 0011 0042 0011 0019 0011 0042 0011 0019 0011 0043 0011 0019 0010 0019 0011 0043 0011 0019 0011 0043 0011 0019 0011 0042 0012 0042 0012 0042 0011 0043 0011 0018 0011 0042 0012 0018 0012 0042 0010 0019 0011 0018 0011 0018 0011 0018 0010 0043 0011 0019 0010 0043 0010 0019 0010 0043 0010 0019 0010 0043 0010 0019 0011 0043 0011 0018 0010 0043 0010 0019 0010 0019 0011 0042 0011 0019 0010 0042 0011 0018 0010 0043 0010 0019 0010 0043 0010 00CD 00A5 00AE 0010 0044 000F 001A 0010 0043 000F 0044 000F 001A 000F 0044 0010 0019 000F 0044 000F 001A 000F 0044 000F 001A 000F 001A 000F 0044 000F 001A 000F 0044 0010 0019 0010 0043 000F 0044 000F 0044 000F 0044 000F 001A 000F 0044 000F 001A 0010 0043 000F 001A 0010 0019 000F 001A 000F 001A 000F 0044 0010 0019 000F 0044 0010 0019 000F 0044 000F 001A 0010 0043 0010 0019 000F 0044 000F 001A 000F 0044 0010 0019 0010 0019 000F 0044 0010 0019 000F 0044 000F 001A 0010 0044 000F 001A 000F 0044 000F 0181"
          repeat:
            times: 2
            wait_time: 40ms

# ==================== 在这里添加以下代码 ====================
sensor:
  - platform: dht
    # 重点在这里！我们使用GPIO0并启用内部上拉电阻
    pin:
      number: GPIO0
      mode: INPUT_PULLUP # <-- 这行代码就是用来替代物理电阻的关键！
    model: DHT22
    temperature:
      name: "Temperature" # 在Home Assistant中显示的实体名称
    humidity:
      name: "Humidity" # 在Home Assistant中显示的实体名称
    update_interval: 60s # 每60秒更新一次数据，可以根据需要调整
