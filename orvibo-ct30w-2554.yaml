esphome:
  name: orvibo-ct30w-2554

esp8266:
  board: esp_wroom_02
  restore_from_flash: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "orvibo-ct30w-2554"
    password: "12345678"

captive_portal:

api:

ota:
  platform: esphome
  password: !secret ota_password

logger:
  level: INFO

web_server:
  port: 80

status_led:
  pin: 15

remote_receiver:
  pin:
    number: 5
    inverted: true
  dump:
    - haier
    - pronto
    - raw
  tolerance: 30%
  buffer_size: 2000
  filter: 10us

remote_transmitter:
  pin:
    number: 14
  carrier_duty_percent: 50%

switch:
  - platform: template
    name: "空调"
    id: ac_power_switch
    icon: "mdi:air-conditioner"
    optimistic: true

    # Power on, decoded from "Received Haier"
    turn_on_action:
      - remote_transmitter.transmit_haier:
          code: [0xA6, 0x22, 0x00, 0x00, 0x40, 0x20, 0x00, 0x20, 0x00, 0x00, 0x00, 0x00, 0x05]
          repeat:
            times: 2
            wait_time: 40ms

    # Power off, decoded from "Received Haier"
    turn_off_action:
      - remote_transmitter.transmit_haier:
          code: [0xA6, 0x20, 0x00, 0x00, 0x00, 0x20, 0x00, 0x20, 0x00, 0x00, 0x00, 0x00, 0x05]
          repeat:
            times: 2
            wait_time: 40ms

sensor:
  - platform: dht
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
    model: DHT22
    temperature:
      name: "Temperature"
    humidity:
      name: "Humidity"
    update_interval: 60s
